<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesd.css">
    <title>Formulario Arthur</title>
</head>

<body>
    <div class="caixa">
        <h1 class="caixa__titulo">Formulario</h1>
        <form action="/enviar_dados" class="caixa__formulario">
            <label for="name">Nome</label>
            <input type="text" name="name" placeholder="Seu nome">
            <label for="name">Último nome</label>
            <input type="text" name="name" placeholder="Seu último nome">
            <label for="Email">Seu email</label>
            <input type="email" name="email" placeholder="Seu @email">
            <label for="date">Sua data de nascimento</label>
            <input type="date" name="date" placeholder="Seu aniversário">
            <div class="caixa__formulario__botoes">
                <button type="submit">Enviar</button>
                <button type="reset">Apagar</button>
            </div>
        </form>
    </div>
</body>

</html>
